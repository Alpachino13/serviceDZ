version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: servicedz-postgres
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=servicedz_db
    volumes:
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: servicedz-mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - ${DATA_PATH}/mongodb:/data/db

  backend:
    build: ./backend
    container_name: servicedz-api
    restart: always
    ports:
      - "5000:3000"  # Changé : On accède au backend via le port 5000 pour laisser le 3000 au frontend
    env_file: .env
    depends_on:
      - postgres
      - mongodb

  app:
    image: nginx:alpine
    container_name: servicedz-app
    restart: always
    ports:
      - "${APP_PORT}:80"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
    volumes:
      - ${DATA_PATH}/uploads:/usr/share/nginx/html/uploads